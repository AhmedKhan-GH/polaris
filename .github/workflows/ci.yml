name: CI

on:
  push:
    branches: [clean-rewrite-2]
  pull_request:
    branches: [clean-rewrite-2]
  workflow_dispatch:

jobs:
  build:
    name: Clone & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install (fresh clone)
        run: npm ci

      - name: Audit (high+ fails the build)
        run: npm audit --audit-level=high

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: '1'
