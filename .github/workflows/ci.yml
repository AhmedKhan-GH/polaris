name: CI

on:
  push:
    branches: [clean-rewrite]
  pull_request:
    branches: [clean-rewrite]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Clone & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        # Fail only on high/critical advisories — moderate/transitive noise is
        # tracked by Dependabot (.github/dependabot.yml), not blocked here.
        run: npm audit --audit-level=high

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test --if-present

      - name: Integration test
        run: npm run test:integration

      - name: Build
        run: npm run build
        env:
          # Build needs no real env; runtime (E2E job, prod) validates for real.
          SKIP_ENV_VALIDATION: '1'

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build

    services:
      # App database. Migrations are vanilla SQL (no auth.* schema), so a plain
      # Postgres is sufficient — the sign-in-log E2E reads it to verify the sub.
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # App connects as the non-superuser app_user; migrations use the admin role.
      DATABASE_URL: postgresql://app_user:apppw@localhost:5432/postgres
      MIGRATE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Start Supabase
        run: npx supabase start

      - name: Run database migrations
        run: npm run db:migrate

      - name: Create .env.test
        run: |
          {
            echo "TEST_USER_EMAIL=owner@example.com"
            echo "TEST_USER_PASSWORD=test-password-123"
            echo "DATABASE_URL=postgresql://app_user:apppw@localhost:5432/postgres"
            echo "MIGRATE_DATABASE_URL=postgresql://postgres:postgres@localhost:5432/postgres"
            # Real local-Supabase keys for E2E (CLI emits deterministic demo keys).
            echo "NEXT_PUBLIC_SUPABASE_URL=$(npx supabase status -o env | sed -n 's/^API_URL=\"\?\([^\"]*\)\"\?/\1/p')"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(npx supabase status -o env | sed -n 's/^ANON_KEY=\"\?\([^\"]*\)\"\?/\1/p')"
            echo "SUPABASE_SERVICE_ROLE_KEY=$(npx supabase status -o env | sed -n 's/^SERVICE_ROLE_KEY=\"\?\([^\"]*\)\"\?/\1/p')"
          } >> .env.test

      - name: Run E2E tests
        run: npm run test:e2e
