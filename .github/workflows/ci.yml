name: CI

on:
  push:
    branches: [clean-rewrite]
  pull_request:
    branches: [clean-rewrite]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Clone & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test --if-present

      - name: Integration test
        run: npm run test:integration

      - name: Build
        run: npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build

    services:
      # App database. Migrations are vanilla SQL (no auth.* schema), so a plain
      # Postgres is sufficient — the sign-in-log E2E reads it to verify the sub.
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # App connects as the non-superuser app_user; migrations use the admin role.
      DATABASE_URL: postgresql://app_user:apppw@localhost:5432/postgres
      MIGRATE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Start Keycloak
        run: docker compose up -d

      - name: Run database migrations
        run: npm run db:migrate

      - name: Create .env.test
        run: |
          {
            echo "AUTH_KEYCLOAK_ID=polaris-web"
            echo "AUTH_KEYCLOAK_SECRET=polaris-dev-secret"
            echo "AUTH_KEYCLOAK_ISSUER=http://localhost:8080/realms/polaris"
            echo "AUTH_SECRET=ci-test-secret-not-for-production"
            echo "AUTH_TRUST_HOST=true"
            echo "TEST_USER_EMAIL=owner@example.com"
            echo "TEST_USER_PASSWORD=test-password-123"
            echo "DATABASE_URL=postgresql://app_user:apppw@localhost:5432/postgres"
            echo "MIGRATE_DATABASE_URL=postgresql://postgres:postgres@localhost:5432/postgres"
          } >> .env.test

      - name: Wait for Keycloak
        run: |
          for i in $(seq 1 40); do
            if curl -fsS http://localhost:8080/realms/polaris/.well-known/openid-configuration >/dev/null 2>&1; then
              echo "Keycloak ready after ~$((i * 3))s"
              exit 0
            fi
            sleep 3
          done
          echo "Keycloak did not become ready"
          docker compose logs keycloak
          exit 1

      - name: Run E2E tests
        run: npm run test:e2e
