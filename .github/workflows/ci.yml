name: CI

on:
  push:
    branches: [clean-rewrite]
  pull_request:
    branches: [clean-rewrite]
  # Manual trigger so CI can be run on any branch (e.g. feature/* before its PR
  # into clean-rewrite) to validate changes — including changes to this file.
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Clone & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        # Fail only on high/critical advisories — moderate/transitive noise is
        # tracked by Dependabot (.github/dependabot.yml), not blocked here.
        run: npm audit --audit-level=high

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test --if-present

      # Integration tests boot a throwaway postgres:17 via Testcontainers (plus
      # the Ryuk reaper). Cache those images so reruns load them from disk
      # instead of pulling from the registry every time.
      - name: Cache Testcontainers images
        id: tc-images
        uses: actions/cache@v4
        with:
          path: ~/.cache/tc-images.tar
          key: tc-images-${{ runner.os }}-postgres17-ryuk

      - name: Load cached Testcontainers images
        if: steps.tc-images.outputs.cache-hit == 'true'
        run: docker load -i ~/.cache/tc-images.tar

      - name: Integration test
        run: npm run test:integration

      - name: Save Testcontainers images
        if: steps.tc-images.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.cache
          docker save -o ~/.cache/tc-images.tar \
            $(docker images --format '{{.Repository}}:{{.Tag}}' | grep -vi '<none>')

      - name: Build
        run: npm run build
        env:
          # Build needs no real env; runtime (E2E job, prod) validates for real.
          SKIP_ENV_VALIDATION: '1'

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    # No artifact dependency on `build`, so run both jobs in parallel for faster
    # overall feedback. (Trade-off: e2e still runs even if build fails.)

    env:
      # The app's relational data, auth, AND realtime must share ONE database:
      # the Supabase Postgres (:54322, started by `supabase start` below). A
      # separate plain Postgres would split auth/realtime from the app tables —
      # getSessionUser reads profiles via the Supabase client, and the orders
      # broadcast trigger / realtime.messages policy only exist where the
      # `realtime` schema lives. App connects as the non-superuser app_user;
      # migrations use the privileged postgres role.
      DATABASE_URL: postgresql://app_user:apppw@127.0.0.1:54322/postgres
      MIGRATE_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cache the Playwright browser download (version pinned by the lockfile, so
      # key on it). On a hit we skip the download and only install the OS-level
      # deps (cheap), which live outside the cached path.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright (browser + OS deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps (cached browser)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # `supabase start` otherwise pulls ~10 Docker images every run. Cache them
      # so reruns load from disk. Keyed on config.toml; if a CLI bump changes
      # image tags, `supabase start` just pulls the few that differ (docker skips
      # any already loaded) — a stale cache is never wrong, only less effective.
      - name: Cache Supabase Docker images
        id: supabase-images
        uses: actions/cache@v4
        with:
          path: ~/.cache/supabase-images.tar
          key: supabase-images-${{ runner.os }}-${{ hashFiles('supabase/config.toml') }}

      - name: Load cached Supabase images
        if: steps.supabase-images.outputs.cache-hit == 'true'
        run: docker load -i ~/.cache/supabase-images.tar

      # Start only the services the E2E suite needs: Postgres, Auth (GoTrue), the
      # API gateway (Kong), PostgREST, and Realtime (per-user delivery E2E).
      # Excluding Studio, Storage, imgproxy, Inbucket, Edge Runtime, Vector,
      # Analytics, and postgres-meta avoids ~8 images the tests never touch.
      - name: Start Supabase
        run: npx supabase start -x studio,imgproxy,inbucket,edge-runtime,functions,vector,analytics,meta,storage

      - name: Save Supabase images
        if: steps.supabase-images.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.cache
          docker save -o ~/.cache/supabase-images.tar \
            $(docker images --format '{{.Repository}}:{{.Tag}}' | grep -vi '<none>')

      - name: Run database migrations
        run: npm run db:migrate

      - name: Create .env.test
        run: |
          {
            echo "TEST_USER_EMAIL=owner@example.com"
            echo "TEST_USER_PASSWORD=test-password-123"
            echo "DATABASE_URL=postgresql://app_user:apppw@127.0.0.1:54322/postgres"
            echo "MIGRATE_DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:54322/postgres"
            # Real local-Supabase keys for E2E (CLI emits deterministic demo keys).
            echo "NEXT_PUBLIC_SUPABASE_URL=$(npx supabase status -o env | sed -n 's/^API_URL=\"\?\([^\"]*\)\"\?/\1/p')"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(npx supabase status -o env | sed -n 's/^ANON_KEY=\"\?\([^\"]*\)\"\?/\1/p')"
            echo "SUPABASE_SERVICE_ROLE_KEY=$(npx supabase status -o env | sed -n 's/^SERVICE_ROLE_KEY=\"\?\([^\"]*\)\"\?/\1/p')"
          } >> .env.test

      - name: Run E2E tests
        run: npm run test:e2e
