# Local Keycloak identity provider for Polaris (dev/CI only).
# Step 1 of the Keycloak migration — see docs/superpowers/specs/2026-06-06-keycloak-auth-design.md
#
# Verify after `docker compose up -d`:
#   curl -fsS http://localhost:8080/realms/polaris/.well-known/openid-configuration

services:
  # Keycloak's own datastore — separate from the app database.
  keycloak-db:
    image: postgres:16
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U keycloak']
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command: ['start-dev', '--import-realm']
    environment:
      # Bootstrap admin (Keycloak 26+ env names). Local/dev only.
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HEALTH_ENABLED: 'true'
    ports:
      - '8080:8080'
    volumes:
      # --import-realm reads *.json from /opt/keycloak/data/import on startup.
      - ./keycloak:/opt/keycloak/data/import
    depends_on:
      keycloak-db:
        condition: service_healthy

volumes:
  keycloak-db-data:
